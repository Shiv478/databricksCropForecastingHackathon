# databricks.yml
# This file defines the Databricks Asset Bundle for the Crop Forecasting application.

bundle:
  name: crop-forecasting

resources:
  apps:
    crop_forecasting_app:
      name: crop-forecasting-app
      config:
        # Databricks will run npm install and npm run build automatically.
        command: ["npm", "run", "start"]
        env:
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "8080"
          - name: HOSTNAME
            value: "0.0.0.0"

targets:
  # The 'dev' target is used for development and testing.
  dev:
    mode: development
    default: true
